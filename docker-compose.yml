name: telcostream-bss

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: telcostream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: telcostream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: telcostream-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: telcostream-postgres
    environment:
      POSTGRES_USER: bss
      POSTGRES_PASSWORD: bss_pw
      POSTGRES_DB: telcostream
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bss -d telcostream"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: telcostream-adminer
    depends_on:
      - postgres
    ports:
      - "8081:8080"

  bss-middleware:
    build: ./bss-middleware
    container_name: telcostream-middleware
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telcostream
      SPRING_DATASOURCE_USERNAME: bss
      SPRING_DATASOURCE_PASSWORD: bss_pw
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  dashboard:
    image: nginx:alpine
    container_name: telcostream-dashboard
    depends_on:
      - bss-middleware
    ports:
      - "8082:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro

  cdr-generator:
    build: ./cdr-generator
    container_name: telcostream-generator
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CDR_RATE: "50"
      FRAUD_RATE: "0.02"
      CDR_DURATION: "60"
    profiles: ["generator"]   # run explicitly: docker compose --profile generator up cdr-generator

volumes:
  pg-data:
